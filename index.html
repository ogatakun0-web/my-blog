<!DOCTYPE html>
  <html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        header { background: #1a1a2e; color: white; padding: 20px 40px; }
    header h1 { font-size: 28px; }
    header p { font-size: 14px; color: #aaa; margin-top: 4px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 22px; margin-bottom: 10px; color: #1a1a2e; }
    .card p { font-size: 15px; line-height: 1.7; color: #555; margin-bottom: 16px; }
    .meta { font-size: 13px; color: #999; margin-bottom: 16px; }
    .tweet-btn { display: inline-flex; align-items: center; gap: 8px; background: #000; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; }
    footer { text-align: center; padding: 30px; color: #aaa; font-size: 13px; }
      </style>
        </head>
        <body>
          <header>
            <h1>My Blog</h1>
          <p>記事を書いて、Xでシェアしよう</p>
        </header>
        <div class="container">
          <div class="card">
            <p class="meta">2026年6月13日</p>
            <h2>Gitをインストールしてみた</h2>
            <p>今日はGitをWindowsにインストールしました。Git Bashを使うことでコマンドラインからGitを操作できるようになりました。</p>
      <a class="tweet-btn" href="https://twitter.com/intent/tweet?text=Gitをインストールしてみた&url=https://ogatakun0-web.github.io/my-blog/" target="_blank">𝕏 Xでシェア</a>
          </div>
          <div class="card">
            <p class="meta">2026年6月13日</p>
            <h2>GitHubでページを公開してみた</h2>
            <p>GitHub Pagesを使って静的サイトを公開しました。HTMLファイルを置くだけでWebサイトとして公開できます。</p>
            <a class="tweet-btn" href="https://twitter.com/intent/tweet?text=GitHubでページを公開してみた&url=https://ogatakun0-web.github.io/my-blog/" target="_blank">𝕏 Xでシェア</a>
          </div>
        </div>
        <footer><p>&copy; 2026 My Blog - Powered by GitHub Pages</p></footer>
      </body>
      </html>
